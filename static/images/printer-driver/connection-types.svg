<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="360" fill="#f8fafc" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Printer Connection Methods</text>

  <!-- USB Section -->
  <rect x="40" y="60" width="330" height="270" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="40" y="60" width="330" height="44" rx="10" fill="#3b82f6"/>
  <rect x="40" y="90" width="330" height="14" rx="0" fill="#3b82f6"/>
  <text x="205" y="88" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">USB Connection</text>

  <!-- Computer icon -->
  <rect x="80" y="128" width="90" height="62" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="95" y="135" width="60" height="38" rx="3" fill="#93c5fd"/>
  <rect x="108" y="190" width="34" height="6" rx="2" fill="#93c5fd"/>
  <text x="125" y="218" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">Computer</text>

  <!-- USB Cable -->
  <line x1="170" y1="159" x2="240" y2="159" stroke="#64748b" stroke-width="3" stroke-dasharray="6,3"/>
  <rect x="228" y="153" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="205" y="148" text-anchor="middle" font-size="10" fill="#64748b">USB Cable</text>

  <!-- Printer icon -->
  <rect x="240" y="128" width="90" height="62" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="252" y="138" width="66" height="30" rx="3" fill="#93c5fd"/>
  <rect x="258" y="168" width="54" height="14" rx="2" fill="#bfdbfe"/>
  <rect x="263" y="172" width="44" height="2" rx="1" fill="#93c5fd"/>
  <rect x="263" y="176" width="34" height="2" rx="1" fill="#93c5fd"/>
  <text x="285" y="218" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">Printer</text>

  <!-- USB Steps -->
  <g font-size="12" fill="#334155">
    <circle cx="66" cy="248" r="9" fill="#3b82f6"/>
    <text x="66" y="252" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">1</text>
    <text x="82" y="252" fill="#334155">Connect USB cable</text>
    <circle cx="66" cy="272" r="9" fill="#3b82f6"/>
    <text x="66" y="276" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">2</text>
    <text x="82" y="276" fill="#334155">Windows auto-detects</text>
    <circle cx="66" cy="296" r="9" fill="#3b82f6"/>
    <text x="66" y="300" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">3</text>
    <text x="82" y="300" fill="#334155">Driver installs automatically</text>
    <circle cx="66" cy="320" r="9" fill="#22c55e"/>
    <text x="66" y="324" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">✓</text>
    <text x="82" y="324" fill="#16a34a" font-weight="600">Ready to print!</text>
  </g>

  <!-- WiFi/Network Section -->
  <rect x="430" y="60" width="330" height="270" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="430" y="60" width="330" height="44" rx="10" fill="#8b5cf6"/>
  <rect x="430" y="90" width="330" height="14" rx="0" fill="#8b5cf6"/>
  <text x="595" y="88" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Network / Wi-Fi Connection</text>

  <!-- Router -->
  <rect x="520" y="118" width="70" height="44" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="528" y="126" width="54" height="20" rx="2" fill="#c4b5fd"/>
  <line x1="540" y1="126" x2="540" y2="118" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="555" y1="126" x2="555" y2="114" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="570" y1="126" x2="570" y2="118" stroke="#8b5cf6" stroke-width="2"/>
  <text x="555" y="178" text-anchor="middle" font-size="11" fill="#5b21b6" font-weight="600">Router</text>

  <!-- WiFi waves to Computer -->
  <path d="M490 155 Q480 148 480 140" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
  <path d="M490 155 Q475 143 475 130" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.7"/>
  <path d="M490 155 Q470 138 470 122" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>

  <!-- WiFi waves to Printer -->
  <path d="M620 155 Q630 148 630 140" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
  <path d="M620 155 Q635 143 635 130" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.7"/>
  <path d="M620 155 Q640 138 640 122" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>

  <!-- Computer -->
  <rect x="450" y="118" width="70" height="50" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="460" y="126" width="50" height="30" rx="2" fill="#c4b5fd"/>
  <rect x="472" y="168" width="26" height="5" rx="2" fill="#c4b5fd"/>
  <text x="485" y="190" text-anchor="middle" font-size="11" fill="#5b21b6" font-weight="600">Computer</text>

  <!-- Printer -->
  <rect x="630" y="118" width="90" height="50" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="642" y="128" width="66" height="22" rx="2" fill="#c4b5fd"/>
  <rect x="648" y="150" width="54" height="10" rx="2" fill="#ddd6fe"/>
  <text x="675" y="190" text-anchor="middle" font-size="11" fill="#5b21b6" font-weight="600">Printer</text>

  <!-- Network Steps -->
  <g font-size="12" fill="#334155">
    <circle cx="456" cy="218" r="9" fill="#8b5cf6"/>
    <text x="456" y="222" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">1</text>
    <text x="472" y="222" fill="#334155">Connect printer to Wi-Fi</text>
    <circle cx="456" cy="242" r="9" fill="#8b5cf6"/>
    <text x="456" y="246" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">2</text>
    <text x="472" y="246" fill="#334155">Open Settings → Printers</text>
    <circle cx="456" cy="266" r="9" fill="#8b5cf6"/>
    <text x="456" y="270" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">3</text>
    <text x="472" y="270" fill="#334155">Click "Add a printer"</text>
    <circle cx="456" cy="290" r="9" fill="#8b5cf6"/>
    <text x="456" y="294" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">4</text>
    <text x="472" y="294" fill="#334155">Select printer from list</text>
    <circle cx="456" cy="314" r="9" fill="#22c55e"/>
    <text x="456" y="318" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">✓</text>
    <text x="472" y="318" fill="#16a34a" font-weight="600">Ready to print!</text>
  </g>
</svg>
