<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="760" height="380" fill="#f8fafc" rx="12"/>
  <text x="380" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">Common Problems &amp; Solutions</text>

  <!-- Card 1: Printer not found -->
  <rect x="20" y="56" width="220" height="298" rx="10" fill="#fff" stroke="#fecaca" stroke-width="1.5"/>
  <rect x="20" y="56" width="220" height="48" rx="10" fill="#fef2f2"/>
  <rect x="20" y="90" width="220" height="14" fill="#fef2f2"/>
  <text x="130" y="76" text-anchor="middle" font-size="13" fill="#991b1b">⚠  Printer Not Found</text>
  <text x="130" y="94" text-anchor="middle" font-size="10" fill="#dc2626">During installation</text>

  <g font-size="11" fill="#334155">
    <rect x="32" y="118" width="196" height="46" rx="6" fill="#fef9c3"/>
    <text x="42" y="136" font-weight="600" fill="#854d0e">Check:</text>
    <text x="42" y="152" fill="#713f12">• Printer is powered on</text>
    <text x="42" y="166" fill="#713f12">  (not just in sleep mode)</text>

    <rect x="32" y="174" width="196" height="46" rx="6" fill="#fef9c3"/>
    <text x="42" y="192" font-weight="600" fill="#854d0e">For USB:</text>
    <text x="42" y="208" fill="#713f12">• Try a different USB port</text>
    <text x="42" y="222" fill="#713f12">• Use cable &lt; 3m length</text>

    <rect x="32" y="230" width="196" height="46" rx="6" fill="#fef9c3"/>
    <text x="42" y="248" font-weight="600" fill="#854d0e">For Network:</text>
    <text x="42" y="264" fill="#713f12">• Same Wi-Fi network?</text>
    <text x="42" y="278" fill="#713f12">• Firewall blocking it?</text>

    <rect x="32" y="286" width="196" height="46" rx="6" fill="#dcfce7"/>
    <text x="42" y="304" font-weight="600" fill="#166534">Fix:</text>
    <text x="42" y="318" fill="#15803d">• Restart printer &amp;</text>
    <text x="42" y="332" fill="#15803d">  computer, try again</text>
  </g>

  <!-- Card 2: Printer offline -->
  <rect x="270" y="56" width="220" height="298" rx="10" fill="#fff" stroke="#fed7aa" stroke-width="1.5"/>
  <rect x="270" y="56" width="220" height="48" rx="10" fill="#fff7ed"/>
  <rect x="270" y="90" width="220" height="14" fill="#fff7ed"/>
  <text x="380" y="76" text-anchor="middle" font-size="13" fill="#9a3412">⚠  Printer Shows Offline</text>
  <text x="380" y="94" text-anchor="middle" font-size="10" fill="#ea580c">Cannot print jobs</text>

  <g font-size="11" fill="#334155">
    <rect x="282" y="118" width="196" height="62" rx="6" fill="#fff7ed"/>
    <text x="292" y="136" font-weight="600" fill="#9a3412">Restart Print Spooler:</text>
    <text x="292" y="152" fill="#7c3f0c" font-family="Consolas, monospace" font-size="10">1. Press Win + R</text>
    <text x="292" y="166" fill="#7c3f0c" font-family="Consolas, monospace" font-size="10">2. Type: services.msc</text>
    <text x="292" y="180" fill="#7c3f0c" font-family="Consolas, monospace" font-size="10">3. Press Enter</text>

    <rect x="282" y="190" width="196" height="62" rx="6" fill="#fff7ed"/>
    <text x="292" y="208" fill="#7c3f0c" font-family="Consolas, monospace" font-size="10">4. Find "Print Spooler"</text>
    <text x="292" y="222" fill="#7c3f0c" font-family="Consolas, monospace" font-size="10">5. Right-click → Restart</text>
    <text x="292" y="236" fill="#7c3f0c" font-family="Consolas, monospace" font-size="10">6. Wait 10 seconds</text>
    <text x="292" y="250" fill="#7c3f0c" font-family="Consolas, monospace" font-size="10">7. Try printing again</text>

    <rect x="282" y="262" width="196" height="62" rx="6" fill="#dcfce7"/>
    <text x="292" y="280" font-weight="600" fill="#166534">Also try:</text>
    <text x="292" y="296" fill="#15803d">• Set as default printer</text>
    <text x="292" y="310" fill="#15803d">• Uncheck "Use printer offline"</text>
    <text x="292" y="324" fill="#15803d">  in printer properties</text>
  </g>

  <!-- Card 3: Installation fails -->
  <rect x="520" y="56" width="220" height="298" rx="10" fill="#fff" stroke="#e9d5ff" stroke-width="1.5"/>
  <rect x="520" y="56" width="220" height="48" rx="10" fill="#faf5ff"/>
  <rect x="520" y="90" width="220" height="14" fill="#faf5ff"/>
  <text x="630" y="76" text-anchor="middle" font-size="13" fill="#6b21a8">⚠  Installation Fails</text>
  <text x="630" y="94" text-anchor="middle" font-size="10" fill="#9333ea">Error during setup</text>

  <g font-size="11" fill="#334155">
    <rect x="532" y="118" width="196" height="46" rx="6" fill="#faf5ff"/>
    <text x="542" y="136" font-weight="600" fill="#6b21a8">Run as Administrator:</text>
    <text x="542" y="152" fill="#7e22ce">Right-click the installer</text>
    <text x="542" y="166" fill="#7e22ce">→ "Run as administrator"</text>

    <rect x="532" y="174" width="196" height="46" rx="6" fill="#faf5ff"/>
    <text x="542" y="192" font-weight="600" fill="#6b21a8">Disable Antivirus:</text>
    <text x="542" y="208" fill="#7e22ce">Temporarily pause your</text>
    <text x="542" y="222" fill="#7e22ce">antivirus, then retry</text>

    <rect x="532" y="230" width="196" height="46" rx="6" fill="#faf5ff"/>
    <text x="542" y="248" font-weight="600" fill="#6b21a8">Wrong Driver?</text>
    <text x="542" y="264" fill="#7e22ce">Verify OS version:</text>
    <text x="542" y="278" fill="#7e22ce">32-bit vs 64-bit</text>

    <rect x="532" y="286" width="196" height="46" rx="6" fill="#dcfce7"/>
    <text x="542" y="304" font-weight="600" fill="#166534">Last Resort:</text>
    <text x="542" y="318" fill="#15803d">Use Windows Update</text>
    <text x="542" y="332" fill="#15803d">(Settings → Windows Update)</text>
  </g>
</svg>
