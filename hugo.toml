baseURL = "https://no6player.github.io/"
title = "Printer Help"
theme = "PaperMod"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = false
  minifyOutput = true

[params]
  env = "production"
  author = "Printer Help"
  description = "Solutions for printer installation and sharing problems"
  keywords = ["printer", "installation", "sharing", "driver", "troubleshooting"]

  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false

  [params.homeInfoParams]
    Title = "Printer Help"
    Content = "Find solutions to printer installation and network sharing problems"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/no6player"

[outputs]
  home = ["HTML", "RSS", "JSON"]

# ──────────────────────────────
#  Languages
# ──────────────────────────────
[languages]

  [languages.en]
    languageName = "English"
    languageCode = "en"
    contentDir = "content/en"
    weight = 1
    title = "Printer Help"
    [languages.en.params]
      description = "Solutions for printer installation and sharing problems"
    [[languages.en.menu.main]]
      name = "Home"
      url = "/"
      weight = 1
